name: Docker Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      image:
        description: '选择要构建的镜像 (留空则构建所有)'
        required: false
        type: choice
        options:
          - 'all'
          - 'HumbleOnJammy'
          - 'FoxyOnFocal'
          - 'NoeticOnFocal'
          - 'NoeticOnJammy'
        default: 'all'
      use_cn_mirror:
        description: '使用中国镜像源'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: HumbleOnJammy
            dockerfile: Dockerfile.HumbleOnJammy
            tag: cros22-humble:latest
          - image: FoxyOnFocal
            dockerfile: Dockerfile.FoxyOnFocal
            tag: cros20-foxy:latest
          - image: NoeticOnFocal
            dockerfile: Dockerfile.NoeticOnFocal
            tag: cros20-noetic:latest
          - image: NoeticOnJammy
            dockerfile: Dockerfile.NoeticOnJammy
            tag: cros22-noetic:latest
    name: Build ROS ${{ matrix.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.image == 'all' ||
          github.event.inputs.image == matrix.image

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.image == 'all' ||
          github.event.inputs.image == matrix.image

      - name: Build Docker Image - ${{ matrix.image }}
        uses: docker/build-push-action@v6
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.image == 'all' ||
          github.event.inputs.image == matrix.image
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.tag }}
          build-args: |
            UID=1001
            GID=1001
            USE_CN_MIRROR=${{ github.event.inputs.use_cn_mirror || 'false' }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
