services:
  ros-noetic-focal:
    image: cros20
    container_name: ros-noetic-focal
    platform: linux/amd64
    privileged: true
    user: ros
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - QT_X11_NO_MITSHM=1
      # 设置 Master URI
      # - ROS_MASTER_URI=http://127.0.0.1:11311
      # - ROS_IP=127.0.0.1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - ${HOME}/.ssh:/home/ros/.ssh:ro
      # TODO: 这里的挂载路径需要改成自己的
      - /home/zhangjunjie/00-zj-humanoid/00-Ros1Space:/home/ros/01-Ros1Space
      # - /home/jay/00-CodeSpace:/home/ros/01-RosSpace
    # 使用默认网络，确保能正常访问外网
    network_mode: "host"
    # networks:
    #   ros_network:
    #     ipv4_address: 192.168.50.60
    # dns:
    #   - 8.8.8.8
    #   - 114.114.114.114
    stdin_open: true
    tty: true
    restart: unless-stopped

  ros-noetic-jammy:
    image: cros22
    container_name: ros-noetic-jammy
    platform: linux/amd64
    privileged: true
    user: ros
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - QT_X11_NO_MITSHM=1
      # 设置 Master URI
      # - ROS_MASTER_URI=http://127.0.0.1:11311
      # - ROS_IP=127.0.0.1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - ${HOME}/.ssh:/home/ros/.ssh:ro
      # TODO: 这里的挂载路径需要改成自己的
      - /home/zhangjunjie/00-zj-humanoid/00-Ros1Space:/home/ros/01-Ros1Space
      # - /home/jay/00-CodeSpace:/home/ros/01-RosSpace
    network_mode: "host"
    # networks:
    #   ros_network:
    #     ipv4_address: 192.168.50.70
    # dns:
    #   - 8.8.8.8
    #   - 114.114.114.114
    stdin_open: true
    tty: true
    restart: unless-stopped

  ros-humble-jammy:
    image: cros22-humble
    container_name: ros-humble-jammy
    platform: linux/amd64
    privileged: true
    user: ros
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - QT_X11_NO_MITSHM=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # ROS2 域ID，同一网络内不同机器人需使用不同的ID
      # - ROS_DOMAIN_ID=0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - ${HOME}/.ssh:/home/ros/.ssh:ro
      # TODO: 这里的挂载路径需要改成自己的
      - /home/zhangjunjie/00-zj-humanoid/01-Ros2Space:/home/ros/01-Ros2Space
      # - /home/jay/00-CodeSpace:/home/ros/01-RosSpace
    network_mode: "host"
    # networks:
    #   ros_network:
    #     ipv4_address: 192.168.50.80
    # dns:
    #   - 8.8.8.8
    #   - 114.114.114.114
    stdin_open: true
    tty: true
    restart: unless-stopped

  ros-foxy-focal:
    image: cros20-foxy
    container_name: ros-foxy-focal
    platform: linux/amd64
    privileged: true
    user: ros
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - QT_X11_NO_MITSHM=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # ROS2 域ID，同一网络内不同机器人需使用不同的ID
      # - ROS_DOMAIN_ID=0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - ${HOME}/.ssh:/home/ros/.ssh:ro
      # TODO: 这里的挂载路径需要改成自己的
      - /home/zhangjunjie/00-zj-humanoid/01-Ros2Space:/home/ros/01-Ros2Space
      # - /home/jay/00-CodeSpace:/home/ros/01-RosSpace
    network_mode: "host"
    # networks:
    #   ros_network:
    #     ipv4_address: 192.168.50.90
    # dns:
    #   - 8.8.8.8
    #   - 114.114.114.114
    stdin_open: true
    tty: true
    restart: unless-stopped

# 注释掉自定义网络，使用默认桥接网络以确保外网访问
networks:
  ros_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
