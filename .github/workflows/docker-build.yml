name: Docker Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile.NoeticOnFocal
            image: cros20
            name: ROS Noetic on Focal
          - dockerfile: Dockerfile.NoeticOnJammy
            image: cros22
            name: ROS Noetic on Jammy
          - dockerfile: Dockerfile.HumbleOnJammy
            image: cros22-humble
            name: ROS Humble on Jammy

    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.image }}:latest
          build-args: |
            UID=1001
            GID=1001
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
